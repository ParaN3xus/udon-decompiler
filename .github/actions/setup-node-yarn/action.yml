name: "Setup Node and Yarn"
description: "Install Node.js, enable Corepack, and install Yarn dependencies."
inputs:
  node_version:
    description: "Node.js version to install"
    required: false
    default: "24"
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Install Yarn dependencies
      shell: bash
      run: yarn install --immutable
