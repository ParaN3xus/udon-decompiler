name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      UDON_MODULE_INFO: UdonModuleInfo.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Setup Node and Yarn
        uses: ./.github/actions/setup-node-yarn
        with:
          node_version: "24"

      - name: Biome check
        run: yarn biome check

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Check C# formatting
        shell: bash
        run: |
          set -euo pipefail
          git ls-files '*.cs' | xargs yarn run clang-format --dry-run --Werror --style=file:.clang-format

      - name: Dotnet build
        run: dotnet publish tools/UdonProgramDumper/UdonProgramDumper.csproj -c Release -r linux-x64 -p:PublishAot=true

      - name: Download UdonModuleInfo.json
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          UDON_MODULE_INFO_URL: ${{ secrets.UDON_MODULE_INFO_URL }}
        run: |
          set -euo pipefail

          if [ -z "${UDON_MODULE_INFO_URL}" ]; then
            echo "UDON_MODULE_INFO_URL is not set; skipping download."
            exit 0
          fi

          if curl -fsSL "${UDON_MODULE_INFO_URL}" -o "${UDON_MODULE_INFO}"; then
            echo "Downloaded ${UDON_MODULE_INFO} successfully."
          else
            echo "Failed to download ${UDON_MODULE_INFO}; continuing."
          fi

      - name: Cargo test
        if: github.event_name != 'pull_request'
        run: cargo test --test e2e -- --nocapture

      - name: Note skipped e2e tests
        if: github.event_name == 'pull_request'
        run: |
          cat >>"${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## Skipped e2e tests

          `cargo test --test e2e` was skipped for this pull request because it requires
          `UDON_MODULE_INFO_URL`, which is only available from repository secrets.
          EOF

      - name: Comment on skipped e2e tests
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "Warning: PR CI skipped `cargo test --test e2e` because it requires `UDON_MODULE_INFO_URL`, which is only available from repository secrets.",
            });
